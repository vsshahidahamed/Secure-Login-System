{% extends 'base.html' %}
{% block content %}
  <div class="card">
    <div class="card-body">
      <h5 class="card-title">Welcome to SecureApp</h5>
      {% if current_user.is_authenticated %}
        <p class="card-text">Logged in as {{ current_user.username }} ({{ current_user.email }})</p>
      {% else %}
        <p class="card-text">Please register or log in to continue.</p>
      {% endif %}
    </div>
  </div>
{% endblock %}
